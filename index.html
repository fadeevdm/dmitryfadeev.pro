<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dmitry Fadeev | Личный сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-container">
            <!-- Логотип / Имя -->
            <a href="#" class="logo-zone">
                <div class="logo-square"></div>
                <div class="logo-text">
                    <span class="logo-name">Dmitry Fadeev</span>
                    <span class="logo-sub">Expert Solutions</span>
                </div>
            </a>

            <!-- Правая часть шапки: Языки + Гамбургер -->
            <div class="header-actions">
                <div class="lang-switcher">
                    <a href="#ru" class="lang-link active">RU</a>
                    <a href="#en" class="lang-link">EN</a>
                </div>
                
                <button class="menu-toggle" id="menuOpenBtn" aria-label="Открыть меню">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Мобильное боковое меню (Overlay) -->
    <div class="mobile-menu-overlay" id="mobileMenu">
        <div class="mobile-menu-content">
            <button class="menu-close" id="menuCloseBtn" aria-label="Закрыть меню">&times;</button>
            
            <nav class="mobile-nav">
                <a href="#expertise" class="nav-item">Экспертиза</a>
                <a href="#solutions" class="nav-item">Решения</a>
                <a href="#practice" class="nav-item">Практика</a>
                <a href="#about" class="nav-item">Обо мне</a>
                <a href="#contacts" class="nav-item">Связаться</a>
            </nav>
            
            <div class="mobile-menu-footer">
                <a href="#contact" class="btn-discuss">Обсудить проект</a>
            </div>
        </div>
    </div>

    <!-- Контент -->
    <main class="main-content">
        <!-- Сюда вставляй основной контент твоего сайта -->
    </main>

    <script src="script.js"></script>
</body>
</html>
