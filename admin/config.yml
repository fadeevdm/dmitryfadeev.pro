backend:
  name: git-gateway
  branch: main

# Где хранятся загружаемые через CMS файлы (картинки, обложки постов и т.п.)
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "content"
    label: "Контент"

    files:
      - file: "assets/posts.json"
        label: "Посты блога"
        name: "posts"
        format: "json"
        fields:
          - label: "Посты"
            name: "posts"
            widget: "list"
            summary: "{{fields.date}} • {{fields.ru.title}}"
            fields:
              - { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Обложка (cover)", name: "cover", widget: "image" }
              - label: "Изображения внутри поста"
                name: "images"
                widget: "list"
                required: false # Не каждый пост требует доп. картинок
                field: { label: "Изображение", name: "image", widget: "image" }
              - label: "RU"
                name: "ru"
                widget: "object"
                fields:
                  - { label: "Заголовок", name: "title", widget: "string" }
                  - { label: "Кратко", name: "excerpt", widget: "text" }
                  - { label: "Текст", name: "content", widget: "markdown" } # Изменено на markdown для удобного редактора
              - label: "EN"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Excerpt", name: "excerpt", widget: "text" }
                  - { label: "Content", name: "content", widget: "markdown" } # Изменено на markdown
